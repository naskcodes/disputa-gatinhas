<h2 class="h2-shows">Recentes: </h2>
@for (show of shows(); track show.season) {
    <p-card>
        <ng-template #header>
            <img class="img-shows-cover" src="{{ show.cover }}">
        </ng-template>
        <ng-template #title>
            <p class="p-shows-title">{{ show.title }}: {{ show.country }}</p>
        </ng-template>
    </p-card>
}
